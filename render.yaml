services:
  - type: web
    name: instagram-profile-analyser
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false # This will be set in the Render Dashboard
      - key: PYTHON_VERSION
        value: 3.10.12
